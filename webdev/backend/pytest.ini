[pytest]
# Unit sweep is the default: no live backend / DB required.
# The integration probes (test_security.py, security_test.py) hit a running
# server on :4001 and need `requests` — run them explicitly, e.g.:
#     venv/bin/python -m pytest tests/test_security.py
testpaths = tests
python_files = test_*.py
addopts =
    -p no:cacheprovider
    --ignore=tests/test_security.py
    --ignore=tests/security_test.py
markers =
    integration: requires a live backend on :4001 (excluded from the default run)
