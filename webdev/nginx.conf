server {
    server_tokens off;  # hide nginx version (CWE-200)
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 25m;

    # Serve frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
        # X-Frame-Options: DENY a fost eliminat ca Meta Event Setup Tool să poată
        # încărca site-ul într-un iframe. Framing-ul e controlat acum de directiva
        # frame-ancestors din CSP (de mai jos), care permite *.facebook.com / *.facebook.net.
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # HSTS: forțează HTTPS în browser 1 an (proxy-ul din față termină TLS, dar headerul
        # ajunge la client prin proxy). Răspunde la finding-ul „HSTS отсутствует" din pentest.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP: documentul HTML (index.html) e servit de nginx, deci aici trebuie permis
        # Meta Pixel: script-src primește 'unsafe-inline' (snippet-ul inline) +
        # connect.facebook.net (fbevents.js) + www.facebook.com; connect-src primește
        # beacon-urile Facebook; frame-ancestors permite framing-ul de Facebook (Event
        # Setup Tool). Yandex Metrica + Webvisor: mc.yandex.ru în script-src/connect-src
        # + worker-src 'self' blob: (Webvisor pornește un Web Worker din blob). Telegram,
        # fonturile Google și host-ul API rămân în allow-list.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://telegram.org https://connect.facebook.net https://www.facebook.com https://mc.yandex.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://bizcheck.md https://telegram.org https://www.facebook.com https://connect.facebook.net https://mc.yandex.ru wss://mc.yandex.ru; worker-src 'self' blob:; frame-src https://oauth.telegram.org; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self' https://*.facebook.com https://*.facebook.net" always;
    }

    # Static PDF files (preview, outro) — always revalidate so design updates
    # deploy within seconds. Nginx serves 304 Not Modified when unchanged.
    location /pdf/ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Static assets — Vite adds content hash to filenames, safe to cache
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        access_log off;
    }

    # Proxy API calls to backend
    location /api_crowe_bizcheck/ {
        client_max_body_size 25m;
        proxy_pass http://backend:4001/api_crowe_bizcheck/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Override X-Forwarded-For (do NOT append to client-supplied chain).
        # Otherwise an attacker can poison the chain with a fake leading IP and
        # bypass rate limits keyed on a parsed XFF. Backend reads only the
        # last hop via ProxyFix(x_for=1).
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }
}
