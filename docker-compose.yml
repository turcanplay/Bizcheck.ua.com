# =============================================================================
# DOCKER-COMPOSE.YML — PostgreSQL + BizzCheck Bot
# =============================================================================
#
# Pornire:
#   docker-compose up -d          # porneste PostgreSQL + bot
#   docker-compose up -d postgres  # doar PostgreSQL (pentru dezvoltare)
#   docker-compose logs -f bot     # urmareste logurile botului
#
# Prima rulare:
#   1. docker-compose up -d postgres
#   2. cd src && python ../scripts/load_json.py   # incarca intrebarile
#   3. docker-compose up -d bot                    # porneste botul
#
# Oprire:
#   docker-compose down            # opreste totul (datele raman in volume)
#   docker-compose down -v         # opreste + STERGE datele din volume
# =============================================================================

services:
  # ===========================================================================
  # PostgreSQL — Baza de date principala
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: bizzcheck_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bizzcheck_bot
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Ruleaza schema.sql la prima pornire (initializeaza tabelele)
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    # Optimizari PostgreSQL pentru 1000+ useri concurenti
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c maintenance_work_mem=128MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c wal_buffers=16MB
      -c max_wal_size=1GB
      -c checkpoint_completion_target=0.9
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bizzcheck_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # PostgreSQL de test (pentru pytest)
  # ===========================================================================
  postgres-test:
    image: postgres:16-alpine
    container_name: bizzcheck_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bizzcheck_test
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bizzcheck_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Bot — BizzCheck Telegram Bot
  # ===========================================================================
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bizzcheck_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/bizzcheck_bot
    working_dir: /app/src
    command: python main.py

volumes:
  pgdata:
